<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ж–Үз« иҜҰжғ… - жҲ‘зҡ„дёӘдәәзҪ‘з«ҷ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#1e293b', 700: '#334155', 600: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .prose { color: #e2e8f0; }
        .prose h1, .prose h2, .prose h3, .prose h4 { color: #f8fafc; font-family: 'Space Grotesk', sans-serif; }
        .prose a { color: #3b82f6; }
        .prose code { background: #1e293b; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
        .prose pre { background: #1e293b; padding: 1em; border-radius: 8px; overflow-x: auto; }
        .prose pre code { background: none; padding: 0; }
        .prose blockquote { border-left: 4px solid #3b82f6; padding-left: 1em; color: #94a3b8; }
        .prose img { border-radius: 8px; max-width: 100%; }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-dark-900/80 backdrop-blur-md border-b border-dark-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="font-display text-xl font-bold gradient-text">КЧТі</a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-400 hover:text-white transition-colors">йҰ–йЎө</a>
                    <a href="projects.html" class="text-gray-400 hover:text-white transition-colors">дҪңе“Ғйӣ?/a>
                    <a href="blog.html" class="text-blue-400 font-medium">еҚҡе®ў</a>
                    <a href="about.html" class="text-gray-400 hover:text-white transition-colors">е…ідәҺжҲ?/a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-gray-400 hover:text-white"><i data-lucide="menu" class="w-6 h-6"></i></button>
            </div>
        </div>
    </nav>

    <article class="pt-32 pb-20">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="postHeader" class="mb-12"></div>
            <div id="postContent" class="prose prose-lg max-w-none"></div>
            <div id="postFooter" class="mt-16 pt-8 border-t border-dark-700"></div>
        </div>
    </article>

    <footer class="bg-dark-900 border-t border-dark-700 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-500 text-sm">&copy; 2025 жҲ‘зҡ„дёӘдәәзҪ‘з«ҷ. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            Data.initDefaultData();
            loadPost();

            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('mobileMenu')?.classList.toggle('hidden');
            });
        });

        function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) { window.location.href = 'blog.html'; return; }

            const post = Data.getPostBySlug(slug);
            if (!post) { window.location.href = 'blog.html'; return; }

            Data.incrementPostViews(slug);

            document.title = `${post.title} - жҲ‘зҡ„дёӘдәәзҪ‘з«ҷ`;

            document.getElementById('postHeader').innerHTML = `
                <div class="flex items-center gap-4 text-sm text-gray-500 mb-4">
                    <span>${Utils.formatDate(post.createdAt)}</span>
                    <span>${Utils.calculateReadingTime(post.content)} еҲҶй’ҹйҳ…иҜ»</span>
                    <span>${post.views || 0} ж¬Ўйҳ…иҜ?/span>
                </div>
                <h1 class="font-display text-3xl md:text-4xl lg:text-5xl font-bold mb-6">${post.title}</h1>
                ${post.coverImage ? `<img src="${post.coverImage}" alt="${post.title}" class="w-full rounded-2xl">` : ''}
            `;

            document.getElementById('postContent').innerHTML = marked.parse(post.content);
            hljs.highlightAll();

            const { posts } = Data.getPosts({ published: true });
            const currentIndex = posts.findIndex(p => p.slug === slug);
            const prevPost = currentIndex > 0 ? posts[currentIndex - 1] : null;
            const nextPost = currentIndex < posts.length - 1 ? posts[currentIndex + 1] : null;

            document.getElementById('postFooter').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between gap-4">
                    ${prevPost ? `<a href="blog-post.html?slug=${prevPost.slug}" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors"><i data-lucide="arrow-left" class="w-4 h-4"></i><span>дёҠдёҖзҜ? ${prevPost.title}</span></a>` : '<div></div>'}
                    ${nextPost ? `<a href="blog-post.html?slug=${nextPost.slug}" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors md:text-right"><span>дёӢдёҖзҜ? ${nextPost.title}</span><i data-lucide="arrow-right" class="w-4 h-4"></i></a>` : '<div></div>'}
                </div>
            `;
            lucide.createIcons();
        }
    </script>
</body>
</html>
