<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - 我的个人网站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#1e293b', 700: '#334155', 600: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-dark-900/80 backdrop-blur-md border-b border-dark-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="font-display text-xl font-bold gradient-text">首页</a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-400 hover:text-white transition-colors">首页</a>
                    <a href="projects.html" class="text-gray-400 hover:text-white transition-colors">作品集</a>
                    <a href="blog.html" class="text-blue-400 font-medium">博客</a>
                    <a href="about.html" class="text-gray-400 hover:text-white transition-colors">关于我</a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-gray-400 hover:text-white"><i data-lucide="menu" class="w-6 h-6"></i></button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden bg-dark-800 border-t border-dark-700">
            <div class="px-4 py-3 space-y-2">
                <a href="index.html" class="block py-2 text-gray-400 hover:text-white">首页</a>
                <a href="projects.html" class="block py-2 text-gray-400 hover:text-white">作品集</a>
                <a href="blog.html" class="block py-2 text-blue-400 font-medium">博客</a>
                <a href="about.html" class="block py-2 text-gray-400 hover:text-white">关于我</a>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h1 class="font-display text-4xl md:text-5xl font-bold mb-4">博客</h1>
                <p class="text-gray-400">分享技术、思考和经验</p>
            </div>

            <div class="max-w-2xl mx-auto mb-12">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜索文章..." class="w-full px-5 py-4 bg-dark-800 border border-dark-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors pl-12">
                    <i data-lucide="search" class="w-5 h-5 text-gray-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-3 mb-12">
                <button class="filter-btn active px-4 py-2 rounded-full text-sm font-medium transition-all bg-blue-500 text-white" data-filter="all">全部</button>
                <div id="categoryFilters"></div>
            </div>

            <div id="postsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

            <div id="pagination" class="flex justify-center gap-2 mt-12"></div>
        </div>
    </section>

    <footer class="bg-dark-900 border-t border-dark-700 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-500 text-sm">&copy; 2025 我的个人网站. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script>
        let currentPage = 1;
        const postsPerPage = 9;
        let currentFilter = 'all';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            Data.initDefaultData();
            loadCategories();
            loadPosts();

            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('mobileMenu').classList.toggle('hidden');
            });

            document.getElementById('searchInput').addEventListener('input', Utils.debounce((e) => {
                searchQuery = e.target.value;
                currentPage = 1;
                loadPosts();
            }, 300));
        });

        function loadCategories() {
            const categories = Data.getCategories('post');
            const container = document.getElementById('categoryFilters');
            container.innerHTML = categories.map(cat => `
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-dark-800 text-gray-400 hover:bg-dark-700" data-filter="${cat.id}">${cat.name}</button>
            `).join('');

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-blue-500', 'text-white');
                        b.classList.add('bg-dark-800', 'text-gray-400');
                    });
                    btn.classList.remove('bg-dark-800', 'text-gray-400');
                    btn.classList.add('bg-blue-500', 'text-white');
                    currentFilter = btn.dataset.filter;
                    currentPage = 1;
                    loadPosts();
                });
            });
        }

        function loadPosts() {
            const filters = { published: true, page: currentPage, limit: postsPerPage, search: searchQuery };
            if (currentFilter !== 'all') filters.category = currentFilter;

            const result = Data.getPosts(filters);
            const container = document.getElementById('postsGrid');

            if (result.posts.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500"><i data-lucide="file-text" class="w-12 h-12 mx-auto mb-4 opacity-50"></i><p>暂无文章</p></div>`;
                lucide.createIcons();
                renderPagination(0);
                return;
            }

            container.innerHTML = result.posts.map(post => `
                <a href="blog-post.html?slug=${post.slug}" class="group block bg-dark-800 rounded-2xl overflow-hidden card-hover border border-dark-700">
                    <div class="aspect-video bg-dark-700 overflow-hidden">
                        ${post.coverImage ? `<img src="${post.coverImage}" alt="${post.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">` : `<div class="w-full h-full flex items-center justify-center"><i data-lucide="file-text" class="w-12 h-12 text-gray-600"></i></div>`}
                    </div>
                    <div class="p-6">
                        <div class="flex items-center gap-4 text-sm text-gray-500 mb-3">
                            <span>${Utils.formatDate(post.createdAt)}</span>
                            <span>${Utils.calculateReadingTime(post.content)} 分钟阅读</span>
                        </div>
                        <h3 class="font-display text-xl font-semibold mb-2 group-hover:text-blue-400 transition-colors line-clamp-2">${post.title}</h3>
                        <p class="text-gray-400 text-sm line-clamp-2">${post.excerpt || post.content.substring(0, 100)}...</p>
                    </div>
                </a>
            `).join('');

            lucide.createIcons();
            renderPagination(result.totalPages);
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="px-4 py-2 rounded-lg ${i === currentPage ? 'bg-blue-500 text-white' : 'bg-dark-800 text-gray-400 hover:bg-dark-700'} transition-colors" onclick="goToPage(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            loadPosts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
