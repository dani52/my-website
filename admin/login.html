<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#1e293b', 700: '#334155', 600: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="font-display text-3xl font-bold gradient-text mb-2">后台管理</h1>
            <p class="text-gray-400">请登录以继续</p>
        </div>

        <form id="loginForm" class="bg-dark-800 rounded-2xl p-8 border border-dark-700">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">用户名</label>
                <input type="text" id="username" required class="w-full px-4 py-3 bg-dark-900 border border-dark-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors" placeholder="admin">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">密码</label>
                <div class="relative">
                    <input type="password" id="password" required class="w-full px-4 py-3 bg-dark-900 border border-dark-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors" placeholder="admin123">
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-400">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div id="errorMessage" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm"></div>
            <button type="submit" id="loginBtn" class="w-full py-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg font-medium hover:shadow-lg hover:shadow-blue-500/30 transition-all">
                登录
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="../index.html" class="text-gray-500 hover:text-gray-400 text-sm">返回首页</a>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script>
        // 添加全局错误处理
        window.onerror = function(msg, url, line) {
            console.error('全局错误:', msg, '行号:', line);
            alert('发生错误: ' + msg);
            return true;
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('页面加载开始');
            
            try {
                lucide.createIcons();
                console.log('Lucide 图标初始化完成');
                
                Data.initDefaultData();
                console.log('默认数据初始化完成');
                
                Auth.initDefaultUser();
                console.log('默认用户初始化完成');
                
                if (Auth.checkAuth()) {
                    console.log('用户已登录，跳转到首页');
                    window.location.href = 'index.html';
                    return;
                }
                
                console.log('等待用户登录');
                
                document.getElementById('togglePassword').addEventListener('click', () => {
                    const password = document.getElementById('password');
                    password.type = password.type === 'password' ? 'text' : 'password';
                });
                
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    console.log('提交登录表单');
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const errorDiv = document.getElementById('errorMessage');
                    const loginBtn = document.getElementById('loginBtn');
                    
                    console.log('用户名:', username);
                    
                    loginBtn.disabled = true;
                    loginBtn.textContent = '登录中...';
                    
                    try {
                        const result = Auth.login(username, password);
                        console.log('登录结果:', result);
                        
                        if (result.success) {
                            console.log('登录成功，跳转');
                            window.location.href = 'index.html';
                        } else {
                            console.log('登录失败:', result.message);
                            errorDiv.textContent = result.message;
                            errorDiv.classList.remove('hidden');
                            loginBtn.disabled = false;
                            loginBtn.textContent = '登录';
                        }
                    } catch (err) {
                        console.error('登录过程出错:', err);
                        errorDiv.textContent = '登录过程出错: ' + err.message;
                        errorDiv.classList.remove('hidden');
                        loginBtn.disabled = false;
                        loginBtn.textContent = '登录';
                    }
                });
                
                console.log('登录事件绑定完成');
                
            } catch (err) {
                console.error('初始化错误:', err);
                alert('初始化错误: ' + err.message);
            }
        });
    </script>
</body>
</html>
