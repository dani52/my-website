<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站点设置 - 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#1e293b', 700: '#334155', 600: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <div class="flex h-screen">
        <aside class="w-64 bg-dark-800 border-r border-dark-700 flex flex-col">
            <div class="p-6 border-b border-dark-700">
                <a href="../index.html" target="_blank" class="font-display text-xl font-bold gradient-text">后台管理</a>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>仪表盘</span>
                </a>
                <a href="posts.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <span>文章管理</span>
                </a>
                <a href="projects.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="folder" class="w-5 h-5"></i>
                    <span>项目管理</span>
                </a>
                <a href="categories.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="tags" class="w-5 h-5"></i>
                    <span>分类管理</span>
                </a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-blue-500/10 text-blue-400 rounded-lg">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span>站点设置</span>
                </a>
            </nav>
            <div class="p-4 border-t border-dark-700">
                <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-red-400 transition-colors w-full">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>退出登录</span>
                </button>
            </div>
        </aside>
        <main class="flex-1 overflow-auto">
            <header class="bg-dark-800/50 backdrop-blur-md border-b border-dark-700 sticky top-0 z-10">
                <div class="px-8 py-4 flex justify-between items-center">
                    <h1 class="font-display text-2xl font-bold">站点设置</h1>
                    <div class="flex items-center gap-4">
                        <span id="currentUser" class="text-gray-400"></span>
                        <a href="../index.html" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm">查看网站</a>
                    </div>
                </div>
            </header>
            <div class="p-8">
                <div id="successMessage" class="hidden fixed top-24 right-8 bg-green-500/20 border border-green-500 text-green-400 px-6 py-4 rounded-xl flex items-center gap-3 z-50">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    <span>保存成功！</span>
                </div>
                <form id="settingsForm" class="space-y-8">
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="user" class="w-5 h-5 text-blue-400"></i>
                            基本信息
                        </h2>
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">网站名称</label>
                                <input type="text" id="siteName" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">网站描述</label>
                                <input type="text" id="siteDescription" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">你的名字</label>
                                <input type="text" id="authorName" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">职位/头衔</label>
                                <input type="text" id="authorTitle" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">所在地</label>
                                <input type="text" id="authorLocation" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">邮箱</label>
                                <input type="email" id="authorEmail" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors">
                            </div>
                        </div>
                    </section>
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="layout" class="w-5 h-5 text-purple-400"></i>
                            Hero 区域
                        </h2>
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">主标题</label>
                                <input type="text" id="heroTitle" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-purple-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">副标题</label>
                                <input type="text" id="heroSubtitle" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-purple-500 focus:outline-none transition-colors">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm text-gray-400 mb-2">描述文字</label>
                                <textarea id="heroDescription" rows="3" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-purple-500 focus:outline-none transition-colors resize-none"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">按钮文字</label>
                                <input type="text" id="heroCtaText" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-purple-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">按钮链接</label>
                                <input type="text" id="heroCtaLink" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-purple-500 focus:outline-none transition-colors">
                            </div>
                        </div>
                    </section>
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="lightbulb" class="w-5 h-5 text-yellow-400"></i>
                            技能
                        </h2>
                        <div id="skillsList" class="space-y-4 mb-6"></div>
                        <button type="button" id="addSkillBtn" class="flex items-center gap-2 text-blue-400 hover:text-blue-300 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            添加技能
                        </button>
                    </section>
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="briefcase" class="w-5 h-5 text-green-400"></i>
                            工作经历
                        </h2>
                        <div id="experiencesList" class="space-y-6 mb-6"></div>
                        <button type="button" id="addExperienceBtn" class="flex items-center gap-2 text-blue-400 hover:text-blue-300 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            添加工作经历
                        </button>
                    </section>
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="graduation-cap" class="w-5 h-5 text-orange-400"></i>
                            教育经历
                        </h2>
                        <div id="educationList" class="space-y-6 mb-6"></div>
                        <button type="button" id="addEducationBtn" class="flex items-center gap-2 text-blue-400 hover:text-blue-300 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            添加教育经历
                        </button>
                    </section>
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="link-2" class="w-5 h-5 text-cyan-400"></i>
                            社交媒体
                        </h2>
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">GitHub</label>
                                <input type="url" id="socialGithub" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">Twitter</label>
                                <input type="url" id="socialTwitter" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">LinkedIn</label>
                                <input type="url" id="socialLinkedin" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">微博</label>
                                <input type="url" id="socialWeibo" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none transition-colors">
                            </div>
                        </div>
                    </section>
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="search" class="w-5 h-5 text-pink-400"></i>
                            SEO 配置
                        </h2>
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">页面标题</label>
                                <input type="text" id="seoTitle" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-pink-500 focus:outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">页面描述</label>
                                <input type="text" id="seoDescription" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-pink-500 focus:outline-none transition-colors">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm text-gray-400 mb-2">关键词 (逗号分隔)</label>
                                <input type="text" id="seoKeywords" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-pink-500 focus:outline-none transition-colors">
                            </div>
                        </div>
                    </section>
                    <section class="bg-dark-800 rounded-xl p-6 border border-dark-700">
                        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="layout-bottom" class="w-5 h-5 text-indigo-400"></i>
                            页脚
                        </h2>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">版权信息</label>
                            <input type="text" id="footerCopyright" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-indigo-500 focus:outline-none transition-colors">
                        </div>
                    </section>
                    <div class="flex justify-end">
                        <button type="submit" class="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-lg transition-colors">
                            <i data-lucide="save" class="w-5 h-5"></i>
                            保存设置
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script>
        let skills = [];
        let experiences = [];
        let educationList = [];
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            Auth.checkAuth();
            loadSettings();
            document.getElementById('settingsForm').addEventListener('submit', handleSave);
            document.getElementById('addSkillBtn').addEventListener('click', addSkill);
            document.getElementById('addExperienceBtn').addEventListener('click', addExperience);
            document.getElementById('addEducationBtn').addEventListener('click', addEducation);
            document.getElementById('logoutBtn').addEventListener('click', Auth.logout);
            const user = Auth.getCurrentUser();
            if (user) {
                document.getElementById('currentUser').textContent = user.username;
            }
        });
        function loadSettings() {
            const config = Data.getSiteConfig();
            if (!config) return;
            document.getElementById('siteName').value = config.siteName || '';
            document.getElementById('siteDescription').value = config.siteDescription || '';
            document.getElementById('authorName').value = config.authorName || '';
            document.getElementById('authorTitle').value = config.authorTitle || '';
            document.getElementById('authorLocation').value = config.authorLocation || '';
            document.getElementById('authorEmail').value = config.authorEmail || '';
            if (config.hero) {
                document.getElementById('heroTitle').value = config.hero.title || '';
                document.getElementById('heroSubtitle').value = config.hero.subtitle || '';
                document.getElementById('heroDescription').value = config.hero.description || '';
                document.getElementById('heroCtaText').value = config.hero.ctaText || '';
                document.getElementById('heroCtaLink').value = config.hero.ctaLink || '';
            }
            skills = config.skills || [];
            experiences = config.experiences || [];
            educationList = config.education || [];
            if (config.socialLinks) {
                document.getElementById('socialGithub').value = config.socialLinks.github || '';
                document.getElementById('socialTwitter').value = config.socialLinks.twitter || '';
                document.getElementById('socialLinkedin').value = config.socialLinks.linkedin || '';
                document.getElementById('socialWeibo').value = config.socialLinks.weibo || '';
            }
            if (config.seo) {
                document.getElementById('seoTitle').value = config.seo.title || '';
                document.getElementById('seoDescription').value = config.seo.description || '';
                document.getElementById('seoKeywords').value = config.seo.keywords || '';
            }
            if (config.footer) {
                document.getElementById('footerCopyright').value = config.footer.copyright || '';
            }
            renderSkills();
            renderExperiences();
            renderEducation();
        }
        function renderSkills() {
            const container = document.getElementById('skillsList');
            container.innerHTML = skills.map((skill, index) => `
                <div class="grid grid-cols-12 gap-4 items-end">
                    <div class="col-span-4">
                        <label class="block text-sm text-gray-400 mb-2">技能名称</label>
                        <input type="text" class="skill-name w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors" value="${skill.name || ''}" data-index="${index}">
                    </div>
                    <div class="col-span-4">
                        <label class="block text-sm text-gray-400 mb-2">熟练程度 (0-100)</label>
                        <input type="number" min="0" max="100" class="skill-level w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none transition-colors" value="${skill.level || 0}" data-index="${index}">
                    </div>
                    <div class="col-span-4 flex gap-2">
                        <button type="button" onclick="removeSkill(${index})" class="text-red-400 hover:text-red-300 p-3">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        function addSkill() {
            skills.push({ name: '', level: 50 });
            renderSkills();
        }
        window.removeSkill = function(index) {
            skills.splice(index, 1);
            renderSkills();
        };
        function renderExperiences() {
            const container = document.getElementById('experiencesList');
            container.innerHTML = experiences.map((exp, index) => `
                <div class="p-4 bg-dark-700/50 rounded-lg border border-dark-600">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-sm text-gray-400">工作经历 #${index + 1}</span>
                        <button type="button" onclick="removeExperience(${index})" class="text-red-400 hover:text-red-300">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">职位</label>
                            <input type="text" class="exp-position w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-green-500 focus:outline-none transition-colors" value="${exp.position || ''}" data-index="${index}">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">公司</label>
                            <input type="text" class="exp-company w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-green-500 focus:outline-none transition-colors" value="${exp.company || ''}" data-index="${index}">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">开始时间</label>
                            <input type="text" class="exp-start w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-green-500 focus:outline-none transition-colors" value="${exp.startDate || ''}" data-index="${index}">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">结束时间</label>
                            <input type="text" class="exp-end w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-green-500 focus:outline-none transition-colors" value="${exp.endDate || ''}" data-index="${index}">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm text-gray-400 mb-2">描述</label>
                            <textarea class="exp-desc w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-green-500 focus:outline-none transition-colors resize-none" rows="3" data-index="${index}">${exp.description || ''}</textarea>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        function addExperience() {
            experiences.push({ position: '', company: '', startDate: '', endDate: '', description: '' });
            renderExperiences();
        }
        window.removeExperience = function(index) {
            experiences.splice(index, 1);
            renderExperiences();
        };
        function renderEducation() {
            const container = document.getElementById('educationList');
            container.innerHTML = educationList.map((edu, index) => `
                <div class="p-4 bg-dark-700/50 rounded-lg border border-dark-600">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-sm text-gray-400">教育经历 #${index + 1}</span>
                        <button type="button" onclick="removeEducation(${index})" class="text-red-400 hover:text-red-300">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">学位</label>
                            <input type="text" class="edu-degree w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-orange-500 focus:outline-none transition-colors" value="${edu.degree || ''}" data-index="${index}">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">学校</label>
                            <input type="text" class="edu-school w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-orange-500 focus:outline-none transition-colors" value="${edu.school || ''}" data-index="${index}">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">开始时间</label>
                            <input type="text" class="edu-start w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-orange-500 focus:outline-none transition-colors" value="${edu.startDate || ''}" data-index="${index}">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">结束时间</label>
                            <input type="text" class="edu-end w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-orange-500 focus:outline-none transition-colors" value="${edu.endDate || ''}" data-index="${index}">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm text-gray-400 mb-2">描述</label>
                            <textarea class="edu-desc w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-orange-500 focus:outline-none transition-colors resize-none" rows="3" data-index="${index}">${edu.description || ''}</textarea>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        function addEducation() {
            educationList.push({ degree: '', school: '', startDate: '', endDate: '', description: '' });
            renderEducation();
        }
        window.removeEducation = function(index) {
            educationList.splice(index, 1);
            renderEducation();
        };
        function handleSave(e) {
            e.preventDefault();
            const updatedSkills = [];
            document.querySelectorAll('.skill-name').forEach((input, i) => {
                const levelInput = document.querySelectorAll('.skill-level')[i];
                updatedSkills.push({
                    name: input.value,
                    level: parseInt(levelInput.value) || 0
                });
            });
            const updatedExperiences = [];
            document.querySelectorAll('.exp-position').forEach((input, i) => {
                const company = document.querySelectorAll('.exp-company')[i].value;
                const start = document.querySelectorAll('.exp-start')[i].value;
                const end = document.querySelectorAll('.exp-end')[i].value;
                const desc = document.querySelectorAll('.exp-desc')[i].value;
                updatedExperiences.push({
                    position: input.value,
                    company: company,
                    startDate: start,
                    endDate: end,
                    description: desc
                });
            });
            const updatedEducation = [];
            document.querySelectorAll('.edu-degree').forEach((input, i) => {
                const school = document.querySelectorAll('.edu-school')[i].value;
                const start = document.querySelectorAll('.edu-start')[i].value;
                const end = document.querySelectorAll('.edu-end')[i].value;
                const desc = document.querySelectorAll('.edu-desc')[i].value;
                updatedEducation.push({
                    degree: input.value,
                    school: school,
                    startDate: start,
                    endDate: end,
                    description: desc
                });
            });
            const config = {
                siteName: document.getElementById('siteName').value,
                siteDescription: document.getElementById('siteDescription').value,
                authorName: document.getElementById('authorName').value,
                authorTitle: document.getElementById('authorTitle').value,
                authorLocation: document.getElementById('authorLocation').value,
                authorEmail: document.getElementById('authorEmail').value,
                hero: {
                    title: document.getElementById('heroTitle').value,
                    subtitle: document.getElementById('heroSubtitle').value,
                    description: document.getElementById('heroDescription').value,
                    ctaText: document.getElementById('heroCtaText').value,
                    ctaLink: document.getElementById('heroCtaLink').value
                },
                skills: updatedSkills,
                experiences: updatedExperiences,
                education: updatedEducation,
                socialLinks: {
                    github: document.getElementById('socialGithub').value,
                    twitter: document.getElementById('socialTwitter').value,
                    linkedin: document.getElementById('socialLinkedin').value,
                    weibo: document.getElementById('socialWeibo').value
                },
                seo: {
                    title: document.getElementById('seoTitle').value,
                    description: document.getElementById('seoDescription').value,
                    keywords: document.getElementById('seoKeywords').value
                },
                footer: {
                    copyright: document.getElementById('footerCopyright').value
                }
            };
            Data.saveSiteConfig(config);
            const msg = document.getElementById('successMessage');
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
