<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#1e293b', 700: '#334155', 600: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .prose { color: #e2e8f0; }
        .prose h1, .prose h2, .prose h3, .prose h4 { color: #f8fafc; }
        .prose a { color: #3b82f6; }
        .prose code { background: #1e293b; padding: 0.2em 0.4em; border-radius: 4px; }
        .prose pre { background: #1e293b; padding: 1em; border-radius: 8px; }
        .prose pre code { background: none; padding: 0; }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <aside class="w-64 bg-dark-800 border-r border-dark-700 flex flex-col">
            <div class="p-6 border-b border-dark-700">
                <a href="../index.html" target="_blank" class="font-display text-xl font-bold gradient-text">Portfolio</a>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>仪表盘</span>
                </a>
                <a href="posts.html" class="flex items-center gap-3 px-4 py-3 bg-blue-500/10 text-blue-400 rounded-lg">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <span>文章管理</span>
                </a>
                <a href="projects.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="folder" class="w-5 h-5"></i>
                    <span>项目管理</span>
                </a>
                <a href="categories.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="tags" class="w-5 h-5"></i>
                    <span>分类管理</span>
                </a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-dark-700 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span>站点设置</span>
                </a>
            </nav>
            <div class="p-4 border-t border-dark-700">
                <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-red-400 transition-colors w-full">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>退出登录</span>
                </button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-auto">
            <header class="bg-dark-800/50 backdrop-blur-md border-b border-dark-700 sticky top-0 z-10">
                <div class="px-8 py-4 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <a href="posts.html" class="text-gray-400 hover:text-white"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                        <h1 id="pageTitle" class="font-display text-2xl font-bold">新建文章</h1>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="previewBtn" class="px-4 py-2 border border-dark-600 text-gray-300 rounded-lg hover:bg-dark-700 transition-colors">预览</button>
                        <button id="saveDraftBtn" class="px-4 py-2 bg-dark-700 text-gray-300 rounded-lg hover:bg-dark-600 transition-colors">保存草稿</button>
                        <button id="publishBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">发布</button>
                    </div>
                </div>
            </header>

            <div class="p-8 max-w-6xl">
                <form id="postForm" class="space-y-6">
                    <input type="hidden" id="postId">
                    
                    <!-- 标题 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">标题</label>
                        <input type="text" id="title" required class="w-full px-4 py-3 bg-dark-800 border border-dark-700 rounded-lg text-white text-xl font-semibold placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors" placeholder="输入文章标题">
                    </div>

                    <!-- 链接和分类 -->
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">URL 链接</label>
                            <div class="flex items-center gap-2">
                                <span class="text-gray-500">/</span>
                                <input type="text" id="slug" required class="flex-1 px-4 py-2 bg-dark-800 border border-dark-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors" placeholder="article-url">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">分类</label>
                            <select id="categories" multiple class="w-full px-4 py-2 bg-dark-800 border border-dark-700 rounded-lg text-white focus:outline-none focus:border-blue-500 transition-colors">
                                <!-- 动态生成 -->
                            </select>
                            <p class="text-xs text-gray-500 mt-1">按住 Ctrl 可选择多个分类</p>
                        </div>
                    </div>

                    <!-- 封面图 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">封面图</label>
                        <div class="flex items-center gap-4">
                            <div id="coverPreview" class="w-32 h-20 bg-dark-800 border border-dark-700 rounded-lg flex items-center justify-center overflow-hidden">
                                <i data-lucide="image" class="w-8 h-8 text-gray-600"></i>
                            </div>
                            <div class="flex-1">
                                <input type="file" id="coverImage" accept="image/*" class="hidden">
                                <button type="button" onclick="document.getElementById('coverImage').click()" class="px-4 py-2 bg-dark-700 text-gray-300 rounded-lg hover:bg-dark-600 transition-colors">选择图片</button>
                                <button type="button" id="removeCoverBtn" class="hidden px-4 py-2 text-red-400 hover:text-red-300 transition-colors">移除</button>
                            </div>
                        </div>
                    </div>

                    <!-- 编辑器 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">内容 (Markdown)</label>
                        <div class="grid lg:grid-cols-2 gap-4">
                            <textarea id="content" rows="20" class="w-full px-4 py-3 bg-dark-800 border border-dark-700 rounded-lg text-white font-mono text-sm placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors resize-none" placeholder="输入 Markdown 内容...

支持语法：
# 标题
## 二级标题
**粗体** *斜体*
[链接](url)
![图片](url)
```代码```
- 列表项"></textarea>
                            <div id="preview" class="hidden lg:block bg-dark-800 border border-dark-700 rounded-lg p-6 prose prose-lg max-w-none overflow-auto" style="max-height: 500px;"></div>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script>
        let currentPost = null;
        let coverImageBase64 = '';

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            Data.initDefaultData();
            
            if (!Auth.protectRoute()) return;
            
            loadCategories();
            loadPost();
            
            // 标题自动生成分类
            document.getElementById('title').addEventListener('blur', () => {
                const slug = document.getElementById('slug');
                if (!slug.value && document.getElementById('title').value) {
                    slug.value = Utils.slugify(document.getElementById('title').value);
                }
            });
            
            // 图片上传
            document.getElementById('coverImage').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const base64 = await Utils.fileToBase64(file);
                coverImageBase64 = await Utils.compressImage(base64, 800);
                
                document.getElementById('coverPreview').innerHTML = `<img src="${coverImageBase64}" class="w-full h-full object-cover">`;
                document.getElementById('removeCoverBtn').classList.remove('hidden');
            });
            
            // 移除封面
            document.getElementById('removeCoverBtn').addEventListener('click', () => {
                coverImageBase64 = '';
                document.getElementById('coverPreview').innerHTML = '<i data-lucide="image" class="w-8 h-8 text-gray-600"></i>';
                document.getElementById('removeCoverBtn').classList.add('hidden');
                document.getElementById('coverImage').value = '';
                lucide.createIcons();
            });
            
            // 实时预览
            document.getElementById('content').addEventListener('input', Utils.debounce(() => {
                updatePreview();
            }, 300));
            
            // 预览按钮
            document.getElementById('previewBtn').addEventListener('click', () => {
                const preview = document.getElementById('preview');
                preview.classList.toggle('hidden');
                if (!preview.classList.contains('hidden')) {
                    updatePreview();
                }
            });
            
            // 保存草稿
            document.getElementById('saveDraftBtn').addEventListener('click', () => savePost(false));
            
            // 发布
            document.getElementById('publishBtn').addEventListener('click', () => savePost(true));
            
            // 退出登录
            document.getElementById('logoutBtn').addEventListener('click', () => {
                Auth.logout();
                window.location.href = 'login.html';
            });
        });
        
        function loadCategories() {
            const categories = Data.getCategories('post');
            const select = document.getElementById('categories');
            select.innerHTML = categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        }
        
        function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (!id) return;
            
            currentPost = Data.getPostById(id);
            if (!currentPost) {
                Utils.showToast('文章不存在', 'error');
                window.location.href = 'posts.html';
                return;
            }
            
            document.getElementById('pageTitle').textContent = '编辑文章';
            document.getElementById('postId').value = currentPost.id;
            document.getElementById('title').value = currentPost.title;
            document.getElementById('slug').value = currentPost.slug;
            document.getElementById('content').value = currentPost.content;
            
            // 设置分类
            const categorySelect = document.getElementById('categories');
            Array.from(categorySelect.options).forEach(option => {
                option.selected = currentPost.categories.includes(option.value);
            });
            
            // 设置封面
            if (currentPost.coverImage) {
                coverImageBase64 = currentPost.coverImage;
                document.getElementById('coverPreview').innerHTML = `<img src="${coverImageBase64}" class="w-full h-full object-cover">`;
                document.getElementById('removeCoverBtn').classList.remove('hidden');
            }
            
            updatePreview();
        }
        
        function updatePreview() {
            const content = document.getElementById('content').value;
            document.getElementById('preview').innerHTML = marked.parse(content);
            hljs.highlightAll();
        }
        
        async function savePost(published) {
            const title = document.getElementById('title').value.trim();
            const slug = document.getElementById('slug').value.trim();
            const content = document.getElementById('content').value.trim();
            
            if (!title || !slug || !content) {
                Utils.showToast('请填写标题、链接和内容', 'error');
                return;
            }
            
            const categorySelect = document.getElementById('categories');
            const selectedCategories = Array.from(categorySelect.selectedOptions).map(opt => opt.value);
            
            const postData = {
                title,
                slug,
                content,
                excerpt: content.substring(0, 150).replace(/[#*`\[\]]/g, '') + '...',
                coverImage: coverImageBase64,
                published,
                categories: selectedCategories,
                tags: []
            };
            
            let result;
            if (currentPost) {
                result = Data.updatePost(currentPost.id, postData);
            } else {
                result = Data.createPost(postData);
            }
            
            if (result.success) {
                Utils.showToast(published ? '文章已发布' : '草稿已保存');
                setTimeout(() => window.location.href = 'posts.html', 500);
            } else {
                Utils.showToast(result.message, 'error');
            }
        }
    </script>
</body>
</html>
