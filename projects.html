<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集 - 我的个人网站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/custom.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#1e293b', 700: '#334155', 600: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2); }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-dark-900/80 backdrop-blur-md border-b border-dark-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="font-display text-xl font-bold gradient-text">首页</a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-400 hover:text-white transition-colors">首页</a>
                    <a href="projects.html" class="text-blue-400 font-medium">作品集</a>
                    <a href="blog.html" class="text-gray-400 hover:text-white transition-colors">博客</a>
                    <a href="about.html" class="text-gray-400 hover:text-white transition-colors">关于我</a>
                </div>
                <button id="mobileMenuBtn" class="md:hidden text-gray-400 hover:text-white"><i data-lucide="menu" class="w-6 h-6"></i></button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden bg-dark-800 border-t border-dark-700">
            <div class="px-4 py-3 space-y-2">
                <a href="index.html" class="block py-2 text-gray-400 hover:text-white">首页</a>
                <a href="projects.html" class="block py-2 text-blue-400 font-medium">作品集</a>
                <a href="blog.html" class="block py-2 text-gray-400 hover:text-white">博客</a>
                <a href="about.html" class="block py-2 text-gray-400 hover:text-white">关于我</a>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12" data-animate>
                <h1 class="font-display text-4xl md:text-5xl font-bold mb-4">作品集</h1>
                <p class="text-gray-400">我创建的项目和作品</p>
            </div>

            <div class="flex flex-wrap justify-center gap-3 mb-12" data-animate>
                <button class="filter-btn active px-4 py-2 rounded-full text-sm font-medium transition-all bg-blue-500 text-white" data-filter="all">全部</button>
                <div id="categoryFilters"></div>
            </div>

            <div id="projectsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <footer class="bg-dark-900 border-t border-dark-700 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-500 text-sm">&copy; 2025 我的个人网站. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            Data.initDefaultData();
            loadCategories();
            loadProjects('all');
            Utils.initPageAnimations();

            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('mobileMenu').classList.toggle('hidden');
            });
        });

        function loadCategories() {
            const categories = Data.getCategories('project');
            const container = document.getElementById('categoryFilters');
            container.innerHTML = categories.map(cat => `
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-dark-800 text-gray-400 hover:bg-dark-700" data-filter="${cat.id}">${cat.name}</button>
            `).join('');

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-blue-500', 'text-white');
                        b.classList.add('bg-dark-800', 'text-gray-400');
                    });
                    btn.classList.remove('bg-dark-800', 'text-gray-400');
                    btn.classList.add('bg-blue-500', 'text-white');
                    loadProjects(btn.dataset.filter);
                });
            });
        }

        function loadProjects(filter) {
            const projects = filter === 'all' ? Data.getProjects() : Data.getProjects({ category: filter });
            const container = document.getElementById('projectsGrid');

            if (projects.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500"><i data-lucide="folder-open" class="w-12 h-12 mx-auto mb-4 opacity-50"></i><p>暂无项目</p></div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = projects.map(project => `
                <div class="group bg-dark-800 rounded-2xl overflow-hidden card-hover border border-dark-700" data-animate>
                    <div class="aspect-video bg-dark-700 overflow-hidden relative">
                        ${project.thumbnail ? `<img src="${project.thumbnail}" alt="${project.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">` : `<div class="w-full h-full flex items-center justify-center"><i data-lucide="image" class="w-12 h-12 text-gray-600"></i></div>`}
                        ${project.featured ? '<span class="absolute top-3 right-3 px-2 py-1 bg-blue-500 text-white text-xs rounded-full">精选</span>' : ''}
                    </div>
                    <div class="p-6">
                        <h3 class="font-display text-xl font-semibold mb-2 group-hover:text-blue-400 transition-colors">${project.title}</h3>
                        <p class="text-gray-400 text-sm mb-4 line-clamp-2">${project.description}</p>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${project.techStack.slice(0, 4).map(tech => `<span class="px-2 py-1 bg-dark-700 rounded text-xs text-gray-300">${tech}</span>`).join('')}
                        </div>
                        <div class="flex gap-3">
                            ${project.demoUrl ? `<a href="${project.demoUrl}" target="_blank" class="flex-1 py-2 bg-blue-500 text-white text-center rounded-lg text-sm hover:bg-blue-600 transition-colors">查看演示</a>` : ''}
                            ${project.repoUrl ? `<a href="${project.repoUrl}" target="_blank" class="flex-1 py-2 border border-dark-600 text-gray-300 text-center rounded-lg text-sm hover:bg-dark-700 transition-colors">源代码</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
